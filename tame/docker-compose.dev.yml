version: '3.8'

services:
  tame:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount source code for live editing
      - .:/app
      # Cache model downloads between restarts
      - model_cache:/root/.cache/huggingface
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/root/.cache/huggingface
      # HuggingFace token for gated models (Gemma, Llama, etc.)
      - HF_TOKEN=${HF_TOKEN}
    # Auto-reload on file changes
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Restart on crash during development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 800s

  chat-ui:
    build:
      context: .
      dockerfile: Dockerfile.chat
    volumes:
      - ./chat_ui.py:/app/chat_ui.py
    ports:
      - "7860:7860"
    environment:
      - PYTHONUNBUFFERED=1
      - TAME_API_URL=http://tame:8000
    depends_on:
      tame:
        condition: service_healthy
    restart: unless-stopped

volumes:
  model_cache:
    # Persist HuggingFace model cache
    driver: local
