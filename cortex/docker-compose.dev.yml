version: '3.8'

services:
  cortex:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount source code for live editing
      - .:/app
      # Cache model downloads between restarts
      - model_cache:/root/.cache/huggingface
    ports:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/root/.cache/huggingface
    # Auto-reload on file changes
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Restart on crash during development
    restart: unless-stopped

volumes:
  model_cache:
    # Persist HuggingFace model cache
    driver: local
